name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-build:
    name: Backend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_legacy

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: curiel_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend_legacy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify server starts
        run: timeout 10 node src/server.js || true
        env:
          NODE_ENV: test
          PORT: 4000
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: curiel_db
          DB_USER: postgres
          DB_PASSWORD: postgres123
          JWT_SECRET: ci-test-secret-for-github-actions-minimum-32-bytes

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Build
        run: npm run build
