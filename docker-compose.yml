services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-curiel_db}
      POSTGRES_USER: ${POSTGRES_USER:-curiel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-curiel_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-curiel} -d ${POSTGRES_DB:-curiel_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - curiel-network

  backend:
    build:
      context: ./backend_legacy
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      API_VERSION: ${API_VERSION:-v1}
      DATABASE_URL: ${DATABASE_URL:-postgresql://curiel:curiel_password@postgres:5432/curiel_db}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@curiel.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "4000:4000"
    networks:
      - curiel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api/v1}
    ports:
      - "3000:80"
    networks:
      - curiel-network

volumes:
  postgres_data:

networks:
  curiel-network:
    driver: bridge
