<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CURIEL - Test</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            margin: 0 0 1rem 0;
        }

        p {
            color: #666;
            margin: 0.5rem 0;
        }

        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #10b981;
            color: white;
            border-radius: 0.5rem;
            margin: 1rem 0;
            font-weight: bold;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

        button:hover {
            background: #5568d3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎉 CURIEL Frontend</h1>
        <div class="status">✅ Servidor Funcionando</div>
        <p>Si ves este mensaje, el servidor está corriendo correctamente.</p>
        <p><strong>URL:</strong> http://localhost:5173</p>
        <p><strong>Vite:</strong> v7.3.1</p>
        <button onclick="window.location.href='/test.html'">Recargar</button>
        <hr style="margin: 2rem 0; border: none; border-top: 1px solid #eee;">
        <p style="font-size: 0.9rem; color: #999;">
            Si ves una pantalla en blanco en la app React,<br>
            abre la consola del navegador (F12) para ver errores.
        </p>
    </div>
</body>

</html>
